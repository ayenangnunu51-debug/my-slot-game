<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lion Burma Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-header">
        <div class="logo">LION BURMA</div>
        <div class="auth-box" id="auth-ui">
            <input type="text" id="login-user" placeholder="အမည်">
            <input type="password" id="login-pass" placeholder="လျှို့ဝှက်နံပါတ်">
            <button class="login-btn" onclick="login()">ဝင်မည်</button>
            <div style="font-size: 10px; margin-top: 5px; cursor: pointer; color: gold;" onclick="showSignup()">အကောင့်မရှိသေးပါက ဖွင့်ရန်</div>
        </div>
    </div>

    <div class="main-banner">
        <div class="promo-text">
            <h2>မန်ဘာသစ် 50%</h2>
            <p>နေ့စဉ်ဘောနပ် 20%</p>
            <button class="cashback" style="background:red; color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer;" onclick="spinSlot()">
                စလော့လှည့်မည် (100 K)
            </button>
        </div>
    </div>

    <div class="bottom-menu">
        <div class="menu-item">🎁<br>ပရိုမိုးရှင်း</div>
        <div class="menu-item" onclick="alert('Live Chat ကို ဆက်သွယ်နေပါသည်...')">💬<br>တိုက်ရိုက်စကားပြော</div>
        <div class="menu-item main-btn" onclick="location.reload()">🏠<br>ပင်မ</div>
        <div class="menu-item" onclick="showWallet('deposit')">💰<br>ငွေသွင်း</div>
        <div class="menu-item" onclick="showWallet('withdraw')">💵<br>ငွေထုတ်</div>
    </div>

    <div id="wallet-panel" class="wallet-overlay" style="display:none;">
        <div class="wallet-content">
            <span class="close" onclick="closeWallet()">&times;</span>
            <div id="wallet-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
<div class="game-container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px;">
    <div class="game-card" onclick="spinSlot()" style="background:#161d2b; border:1px solid gold; border-radius:10px; text-align:center; padding:10px;">
        🎰<br><span style="font-size:12px;">Slot 777</span>
    </div>
    <div class="game-card" onclick="alert('မကြာမီလာမည်')" style="background:#161d2b; border:1px solid gold; border-radius:10px; text-align:center; padding:10px;">
        🃏<br><span style="font-size:12px;">Casino</span>
    </div>
    <div class="game-card" onclick="alert('မကြာမီလာမည်')" style="background:#161d2b; border:1px solid gold; border-radius:10px; text-align:center; padding:10px;">
        ⚽<br><span style="font-size:12px;">Sports</span>
    </div>
</div>
