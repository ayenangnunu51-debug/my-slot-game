<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Casino - All in One</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px;">
            <div>
                <h4 style="color: gold; margin: 0;">👤 <span id="user-name">...</span></h4>
                <button onclick="handleLogout()" style="background:none; border:none; color:red; cursor:pointer;">Logout</button>
            </div>
            <h3 style="background: #222; padding: 10px; border-radius: 10px; margin: 0;">💰 <span id="balance">0</span> K</h3>
        </div>

        <div style="margin: 10px 0; color: white;">
            လောင်ကြေးရွေးပါ: 
            <select id="bet-amount" style="padding: 5px; background: #000; color: gold; border: 1px solid gold;">
                <option value="100">100 K</option>
                <option value="200">200 K</option>
                <option value="300">300 K</option>
                <option value="500">500 K</option>
                <option value="1000">1000 K</option>
            </select>
        </div>

        <div style="margin: 10px 0; display: flex; justify-content: center; gap: 10px;">
            <button onclick="showWallet('deposit')" class="play-btn" style="background:#28a745; width:45%;">ငွေသွင်း</button>
            <button onclick="showWallet('withdraw')" class="play-btn" style="background:#dc3545; width:45%;">ငွေထုတ်</button>
        </div>

        <div style="display: flex; gap: 5px; margin-bottom: 15px;">
            <button onclick="switchGame('slot')" class="play-btn" style="flex:1; font-size: 0.8rem;">SLOT</button>
            <button onclick="switchGame('dice')" class="play-btn" style="flex:1; font-size: 0.8rem;">DICE</button>
            <button onclick="switchGame('wheel')" class="play-btn" style="flex:1; font-size: 0.8rem;">WHEEL</button>
        </div>

        <div id="slot-area" class="game-box">
            <div style="font-size: 3rem; margin: 20px 0;">
                <span id="r1">🎰</span> <span id="r2">🎰</span> <span id="r3">🎰</span>
            </div>
            <button class="play-btn" onclick="playSlot()" style="width: 100%;">SPIN</button>
        </div>

        <div id="dice-area" class="game-box" style="display: none;">
            <div id="dice-result" style="font-size: 4rem; margin: 20px 0;">🎲</div>
            <button class="play-btn" onclick="playDice()" style="width: 100%;">ROLL DICE</button>
        </div>

        <div id="wheel-area" class="game-box" style="display: none;">
            <div id="wheel-box" style="width: 150px; height: 150px; border: 5px solid gold; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 2rem;">🎡</div>
            <button class="play-btn" onclick="playWheel()" style="width: 100%;">SPIN WHEEL</button>
        </div>

        <div id="wallet-modal" class="game-box" style="display: none; position: fixed; top: 10%; left: 5%; width: 85%; z-index: 1000; background: #1a1a2e; border: 2px solid gold; padding: 20px; border-radius: 15px;">
            <h3 id="wallet-title" style="color: gold;">ငွေသွင်း/ထုတ်</h3>
            <div id="deposit-info" style="text-align: left; font-size: 0.8rem; margin-bottom: 10px; color: #ccc;">
                <p>Kpay/Wave: 09680575421</p>
            </div>
            <p style="text-align: left; font-size: 0.8rem; color: gold;">လက်ရှိ: <span id="cur-bal">0</span> K</p>
            <input type="number" id="wallet-amount" oninput="calculateBalance()" placeholder="ပမာဏ" style="width: 90%; padding: 10px; margin-bottom: 10px;">
            <input type="text" id="target-phone" placeholder="ငွေလက်ခံမည့်ဖုန်းနံပါတ်" style="width: 90%; padding: 10px; margin-bottom: 10px;">
            <p id="rem-info" style="color: #00ff00; font-size: 0.8rem; text-align: left;">ကျန်မည့်ငွေ: <span id="rem-bal">0</span> K</p>
            <button class="play-btn" onclick="submitWalletRequest()">တင်ပြမည်</button>
            <button class="play-btn" style="background:#555;" onclick="closeWallet()">ပိတ်ပါ</button>
        </div>
    </div>

    <audio id="sound-spin" src="https://www.soundjay.com/misc/sounds/slot-machine-payout-01.mp3"></audio>
    <audio id="sound-win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="sound-dice" src="https://www.soundjay.com/misc/sounds/dice-roll-01.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
