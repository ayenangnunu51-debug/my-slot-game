<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nang Nu Online Casino</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <div class="top-bar">
            <div>👤 <span id="user-display">...</span></div>
            <div class="coins">💰 <span id="coin-display">0</span> K</div>
            <button onclick="logout()">ထွက်ရန်</button>
        </div>

        <div class="nav-tabs">
            <button onclick="switchTab('shan')" id="tab-shan" class="active">ရှမ်းကိုးမီး</button>
            <button onclick="switchTab('slot')">SLOT</button>
            <button onclick="switchTab('dice')">DICE</button>
            <button onclick="switchTab('wheel')">WHEEL</button>
            <button onclick="switchTab('wallet')">WALLET</button>
        </div>

        <div id="shan-panel" class="tab-content active">
            <div class="timer-section">
                <div id="status-text">လောင်းကြေးတင်ရန် အချိန်ကျန်</div>
                <div class="progress-bar"><div id="timer-bar"></div></div>
                <div id="timer-num">30</div>
            </div>
            
            <div class="casino-table">
                <div class="seat dealer"><span class="avatar">👩‍💼</span><div id="d-cards" class="cards"></div>ဒိုင်</div>
                <div class="seat p1"><span class="avatar">👨‍🦰</span><div id="p1-cards" class="cards"></div>P1</div>
                <div class="seat p2"><span class="avatar">👱‍♀️</span><div id="p2-cards" class="cards"></div>P2</div>
                <div class="seat p3"><span class="avatar">🧔</span><div id="p3-cards" class="cards"></div>P3</div>
                <div class="seat p4"><span class="avatar">👵</span><div id="p4-cards" class="cards"></div>P4</div>
                <div class="seat user-pos"><span class="avatar">😎</span><div id="my-cards" class="cards"></div>YOU <span id="my-bet-label"></span></div>
            </div>

            <div class="controls">
                <select id="bet-amount">
                    <option value="500">500 K</option>
                    <option value="1000">1000 K</option>
                    <option value="5000">5000 K</option>
                </select>
                <button onclick="placeBet()" id="bet-btn" class="main-btn">လောင်းမည်</button>
            </div>
        </div>

        <div id="wallet-panel" class="tab-content">
            <div class="wallet-card">
                <h3>ငွေသွင်းရန် (Kpay: 09-XXXXXXXXX)</h3>
                <p>ငွေသွင်းပြီးပါက လုပ်ငန်းစဉ်နံပါတ် နောက်ဆုံး ၆ လုံးကို တင်ပြပါ</p>
                <input type="number" id="deposit-amt" placeholder="သွင်းမည့် ပမာဏ">
                <input type="text" id="deposit-id" placeholder="လုပ်ငန်းစဉ်နံပါတ် (နောက်ဆုံး ၆ လုံး)">
                <button onclick="submitDeposit()" class="deposit-btn">ငွေသွင်းမည်</button>
                
                <hr>
                
                <h3>ငွေထုတ်ရန်</h3>
                <input type="number" id="withdraw-amt" placeholder="ထုတ်မည့် ပမာဏ">
                <input type="text" id="withdraw-phone" placeholder="လက်ခံမည့် ဖုန်းနံပါတ်">
                <button onclick="submitWithdraw()" class="withdraw-btn">ငွေထုတ်မည်</button>
            </div>
        </div>

        <div id="slot-panel" class="tab-content"><h2>🎰 Slot Machine Coming Soon</h2></div>
        <div id="dice-panel" class="tab-content"><h2>🎲 Dice Game Coming Soon</h2></div>
        <div id="wheel-panel" class="tab-content"><h2>🎡 Wheel Spin Coming Soon</h2></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
