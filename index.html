<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Casino - All-in-One</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div class="game-header">
            <div class="user-info">
                <span style="color: gold;"><i class="fas fa-user-circle"></i> <span id="user-name">...</span></span>
                <button onclick="handleLogout()" class="logout-link">Logout</button>
            </div>
            <div class="balance-box">
                💰 <span id="balance">0</span> K
            </div>
        </div>

        <div class="bet-container">
            <span>လောင်းကြေး:</span>
            <select id="bet-amount" class="bet-select">
                <option value="100">100 K</option>
                <option value="500">500 K</option>
                <option value="1000">1,000 K</option>
                <option value="5000">5,000 K</option>
                <option value="10000">10,000 K</option>
            </select>
        </div>

        <div class="game-nav">
            <button onclick="switchGame('slot')" id="nav-slot" class="nav-btn active">Slot</button>
            <button onclick="switchGame('dice')" id="nav-dice" class="nav-btn">Dice</button>
            <button onclick="switchGame('wheel')" id="nav-wheel" class="nav-btn">Wheel</button>
        </div>

        <div id="slot-area" class="game-display">
            <div class="slot-machine">
                <div id="r1" class="reel">🎰</div>
                <div id="r2" class="reel">🎰</div>
                <div id="r3" class="reel">🎰</div>
            </div>
            <button onclick="playSlot()" id="spin-btn" class="action-btn">SPIN NOW</button>
        </div>

        <div id="dice-area" class="game-display" style="display: none;">
            <div class="dice-container">
                <div id="dice-box" class="dice">⚀</div>
            </div>
            <div class="dice-controls">
                <button onclick="playDice('high')" class="action-btn" style="background: #28a745;">အကြီး (၄,၅,၆)</button>
                <button onclick="playDice('low')" class="action-btn" style="background: #dc3545;">အသေး (၁,၂,၃)</button>
            </div>
        </div>

        <div id="wheel-area" class="game-display" style="display: none;">
            <div class="wheel-outer">
                <div id="wheel-pointer">▼</div>
                <div id="wheel-circle" class="wheel">🎡</div>
            </div>
            <button onclick="playWheel()" id="wheel-btn" class="action-btn">SPIN WHEEL</button>
        </div>

        <div class="wallet-footer">
            <button onclick="showWallet('deposit')" class="w-btn d-btn">ငွေသွင်း</button>
            <button onclick="showWallet('withdraw')" class="w-btn w-btn-red">ငွေထုတ်</button>
        </div>

        <div id="wallet-modal" class="modal">
            <div class="modal-content">
                <h3 id="wallet-title" style="color: gold;">ငွေသွင်းမည်</h3>
                <div id="bank-info" class="bank-card">
                    <p>Kpay/Wave: 09680575421</p>
                    <p>Name: Thant Naing Aye</p>
                </div>
                <input type="number" id="wallet-amount" oninput="updateRemBalance()" placeholder="ပမာဏ">
                <input type="text" id="wallet-details" placeholder="ID (သို့) ဖုန်းနံပါတ်">
                <div class="rem-bal-text">ကျန်မည့်ငွေ: <span id="rem-bal">0</span> K</div>
                <div class="modal-btns">
                    <button onclick="submitRequest()" class="action-btn">Confirm</button>
                    <button onclick="closeWallet()" class="action-btn grey-btn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="snd-spin" src="https://www.soundjay.com/misc/sounds/slot-machine-payout-01.mp3"></audio>
    <audio id="snd-win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="snd-dice" src="https://www.soundjay.com/misc/sounds/dice-roll-01.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
