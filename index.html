<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lion Burma Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-header">
        <div class="logo">LION BURMA</div>
        <div class="auth-box">
            <input type="text" placeholder="အမည်">
            <input type="password" placeholder="လျှို့ဝှက်နံပါတ်">
            <button class="login-btn">ဝင်မည်</button>
        </div>
    </div>
    <div class="category-nav">
        <div class="cat-item active">🏠<br>HOME</div>
        <div class="cat-item">🎰<br>စလော့</div>
        <div class="cat-item">🃏<br>ကာစီနို</div>
        <div class="cat-item">⚽<br>အားကစား</div>
        <div class="cat-item">🐟<br>ငါးဖမ်း</div>
    </div>
    <div class="main-banner">
        <div class="promo-text">
            <h2>မန်ဘာသစ် 50%</h2>
            <p>နေ့စဉ်ဘောနပ် 20%</p>
            <div class="cashback">CASH BACK 5%</div>
        </div>
    </div>
    <div class="bottom-menu">
        <div class="menu-item">🎁<br>ပရိုမိုးရှင်း</div>
        <div class="menu-item">💬<br>တိုက်ရိုက်စကားပြော</div>
        <div class="menu-item main-btn">🏠<br>ပင်မ</div>
        <div class="menu-item">💰<br>ငွေသွင်း</div>
        <div class="menu-item">💵<br>ငွေထုတ်</div>
    </div>
</body>
</html>
