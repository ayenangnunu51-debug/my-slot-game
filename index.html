<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Casino - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div class="game-header">
            <div class="user-info">
                <span style="color: gold;"><i class="fas fa-user-circle"></i> <span id="user-name">...</span></span>
                <button onclick="handleLogout()" class="logout-link">Logout</button>
            </div>
            <div class="balance-display">
                💰 <span id="balance">0</span> K
            </div>
        </div>

        <div class="bet-selection">
            <span>BET:</span>
            <select id="bet-amount" class="bet-input">
                <option value="100">100 K</option>
                <option value="500">500 K</option>
                <option value="1000">1,000 K</option>
                <option value="5000">5,000 K</option>
                <option value="10000">10,000 K</option>
            </select>
        </div>

        <div class="game-nav">
            <button onclick="switchGame('slot')" id="nav-slot" class="nav-item active">SLOT</button>
            <button onclick="switchGame('dice')" id="nav-dice" class="nav-item">DICE</button>
            <button onclick="switchGame('wheel')" id="nav-wheel" class="nav-item">WHEEL</button>
        </div>

        <div id="slot-area" class="game-panel">
            <div class="slot-container">
                <div id="r1" class="reel">🎰</div>
                <div id="r2" class="reel">🎰</div>
                <div id="r3" class="reel">🎰</div>
            </div>
            <button onclick="playSlot()" class="action-btn spin-btn">SPIN</button>
        </div>

        <div id="dice-area" class="game-panel" style="display: none;">
            <div id="dice-box" class="dice-view">⚀</div>
            <div class="dice-btns">
                <button onclick="playDice('high')" class="action-btn btn-high">အကြီး (၄,၅,၆)</button>
                <button onclick="playDice('low')" class="action-btn btn-low">အသေး (၁,၂,၃)</button>
            </div>
        </div>

        <div id="wheel-area" class="game-panel" style="display: none;">
            <div class="wheel-box">
                <div id="pointer">▼</div>
                <div id="wheel-inner" class="wheel-circle">🎡</div>
            </div>
            <button onclick="playWheel()" class="action-btn">SPIN WHEEL</button>
        </div>

        <div class="footer-btns">
            <button onclick="showWallet('deposit')" class="w-btn dep-btn">ငွေသွင်း</button>
            <button onclick="showWallet('withdraw')" class="w-btn wit-btn">ငွေထုတ်</button>
        </div>

        <div id="wallet-modal" class="modal-overlay">
            <div class="modal-card">
                <h3 id="wallet-title" style="color: gold;">Transaction</h3>
                <div class="bank-info">
                    <p>KBZ Pay / Wave Pay: 09680575421</p>
                    <p>Name: Thant Naing Aye</p>
                </div>
                <div class="input-group">
                    <label>လက်ရှိပမာဏ: <span id="modal-cur-bal">0</span> K</label>
                    <input type="number" id="wallet-amount" oninput="updateRemCalc()" placeholder="ပမာဏထည့်ပါ">
                    <input type="text" id="wallet-phone" placeholder="ငွေလက်ခံမည့် ဖုန်းနံပါတ်/ID">
                    <label style="color: #00ff00;">ကျန်ရှိမည့်ပမာဏ: <span id="modal-rem-bal">0</span> K</label>
                </div>
                <div class="modal-actions">
                    <button onclick="submitWallet()" class="action-btn">အတည်ပြုမည်</button>
                    <button onclick="closeWallet()" class="action-btn cancel-btn">ပိတ်မည်</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="snd-spin" src="https://www.soundjay.com/misc/sounds/slot-machine-payout-01.mp3"></audio>
    <audio id="snd-win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="snd-dice" src="https://www.soundjay.com/misc/sounds/dice-roll-01.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
