<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Casino - All-in-One</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="auth-screen" class="app-container">
        <h1 style="color: gold; text-align: center;">GOLDEN CASINO</h1>
        <div class="game-box">
            <h2 id="auth-title">CREATE ACCOUNT</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth()" id="auth-btn" class="action-btn">အကောင့်ဖွင့်မည်</button>
            <p onclick="toggleAuth()" id="auth-toggle" style="margin-top:15px; cursor:pointer;">အကောင့်ရှိပြီးသားလား? <span style="color: gold;">ဝင်ပါ</span></p>
        </div>
    </div>

    <div id="game-screen" class="app-container" style="display: none;">
        <div class="game-header">
            <div><i class="fas fa-user-circle"></i> <span id="display-user">...</span></div>
            <div class="balance-box">💰 <span id="balance">0</span> K</div>
            <button onclick="handleLogout()" class="logout-btn">ထွက်ရန်</button>
        </div>

        <div class="bet-area">
            BET: <select id="bet-amount">
                <option value="100">100 K</option>
                <option value="500">500 K</option>
                <option value="1000">1000 K</option>
                <option value="5000">5000 K</option>
            </select>
        </div>

        <div class="game-nav">
            <button onclick="showGame('slot')" class="nav-btn active" id="btn-slot">SLOT</button>
            <button onclick="showGame('dice')" class="nav-btn" id="btn-dice">DICE</button>
            <button onclick="showGame('wheel')" class="nav-btn" id="btn-wheel">WHEEL</button>
        </div>

        <div id="slot-game" class="game-panel">
            <div class="reels"><span id="r1">🎰</span><span id="r2">🎰</span><span id="r3">🎰</span></div>
            <button onclick="playSlot()" class="action-btn">SPIN</button>
        </div>

        <div id="dice-game" class="game-panel" style="display:none;">
            <div id="dice-view" style="font-size: 5rem;">🎲</div>
            <div class="dice-controls">
                <button onclick="playDice('high')" class="action-btn" style="background: green;">အကြီး</button>
                <button onclick="playDice('low')" class="action-btn" style="background: red;">အသေး</button>
            </div>
        </div>

        <div id="wheel-game" class="game-panel" style="display:none;">
            <div class="wheel-container">
                <div id="pointer">▼</div>
                <div id="wheel-inner">🎡</div>
            </div>
            <button onclick="playWheel()" class="action-btn">WHEEL SPIN</button>
        </div>

        <div class="wallet-footer">
            <button onclick="openWallet('deposit')" class="w-btn dep">ငွေသွင်း</button>
            <button onclick="openWallet('withdraw')" class="w-btn wit">ငွေထုတ်</button>
        </div>
    </div>

    <div id="wallet-modal" class="modal">
        <div class="modal-content">
            <h3 id="w-title">ငွေသွင်းမည်</h3>
            <p style="font-size: 0.8rem; background: #000; padding: 5px;">Kpay/Wave: 09680575421 (Name: Thant Naing Aye)</p>
            <input type="number" id="w-amount" placeholder="ပမာဏ">
            <input type="text" id="w-phone" placeholder="ဖုန်းနံပါတ်">
            <button onclick="submitWallet()" class="action-btn">တင်ပြမည်</button>
            <button onclick="closeWallet()" class="action-btn" style="background: #555;">ပိတ်ပါ</button>
        </div>
    </div>

    <audio id="snd-spin" src="https://www.soundjay.com/misc/sounds/slot-machine-payout-01.mp3"></audio>
    <audio id="snd-win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="snd-dice" src="https://www.soundjay.com/misc/sounds/dice-roll-01.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
