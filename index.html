<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Slot - Main Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
            <h4 style="color: gold;">👤 <span id="user-name">...</span></h4>
            <h3 style="background: #222; padding: 10px; border-radius: 15px;">💰 <span id="balance">0</span> K</h3>
        </div>

        <div class="nav-scroll" style="margin-bottom: 20px;">
            <button onclick="switchGame('slot')" class="play-btn" style="padding: 10px 20px; font-size: 0.9rem;">🎰 Slot</button>
            <button onclick="switchGame('dice')" class="play-btn" style="padding: 10px 20px; font-size: 0.9rem;">🎲 Dice</button>
            <button onclick="switchGame('wheel')" class="play-btn" style="padding: 10px 20px; font-size: 0.9rem;">🎡 Wheel</button>
        </div>

        <div id="slot-game" class="game-box">
            <div class="reels-container" style="font-size: 3rem; margin: 20px 0;">
                <span id="r1">🎰</span> <span id="r2">🎰</span> <span id="r3">🎰</span>
            </div>
            <button class="play-btn" onclick="playGame()">SPIN (100K)</button>
        </div>

        <div id="dice-game" class="game-box" style="display:none;">
            <div id="dice" style="font-size: 5rem; margin: 20px 0;">🎲</div>
            <button class="play-btn" onclick="playDice()">ROLL (100K)</button>
        </div>

        <div id="wheel-game" class="game-box" style="display:none;">
            <div id="wheel" style="font-size: 5rem; margin: 20px 0;">🎡</div>
            <button class="play-btn" onclick="playWheel()">SPIN (100K)</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
