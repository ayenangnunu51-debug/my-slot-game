<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Slot - Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px;">
            <div>
                <h4 style="color: gold; margin: 0;">👤 <span id="user-name">Loading...</span></h4>
                <button onclick="handleLogout()" style="background:none; border:none; color:red; cursor:pointer;">Logout</button>
            </div>
            <h3 style="background: #222; padding: 10px; border-radius: 10px; margin: 0;">💰 <span id="balance">0</span> K</h3>
        </div>

        <div style="margin: 10px 0;">
            <button onclick="showWallet('deposit')" class="play-btn" style="background:#28a745; width:45%;">ငွေသွင်း</button>
            <button onclick="showWallet('withdraw')" class="play-btn" style="background:#dc3545; width:45%;">ငွေထုတ်</button>
        </div>

        <div id="wallet-modal" class="game-box" style="display: none; position: fixed; top: 10%; left: 5%; width: 85%; z-index: 1000; background: #1a1a2e; border: 2px solid gold; padding: 20px;">
            <h3 id="wallet-title" style="color: gold;">ငွေသွင်းမည်</h3>
            <div id="deposit-info" style="text-align: left; font-size: 0.8rem; margin-bottom: 10px;">
                <p>Kpay: 09680575421 (Thant Naing Aye)</p>
                <p>Wave: 09684505232 (Thant Naing Aye)</p>
            </div>
            <input type="number" id="wallet-amount" placeholder="ပမာဏ (၅၀၀၀ - ၁၀သိန်း)" style="width: 90%; padding: 10px; margin-bottom: 10px;">
            <input type="text" id="transaction-id" placeholder="လုပ်ငန်းစဉ်အမှတ် သို့မဟုတ် ဖုန်းနံပါတ်" style="width: 90%; padding: 10px; margin-bottom: 15px;">
            <button class="play-btn" onclick="submitWalletRequest()">တင်ပြမည်</button>
            <button class="play-btn" style="background:#555;" onclick="closeWallet()">ပိတ်ပါ</button>
        </div>

        <div id="slot-game" class="game-box">
            <div style="font-size: 3rem; margin: 20px 0;">
                <span id="r1">🎰</span> <span id="r2">🎰</span> <span id="r3">🎰</span>
            </div>
            <button class="play-btn" onclick="playGame()" style="width:100%;">SPIN (100K)</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
