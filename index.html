<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Slot - Casino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="header">
            <h3 style="color: gold;">👤 <span id="user-name">Loading...</span></h3>
            <h2 style="background: #222; padding: 10px; border-radius: 10px;">💰 <span id="balance">0</span> K</h2>
        </div>

        <div class="nav-scroll">
            <button onclick="switchGame('slot')" class="tab-btn">🎰 Slot</button>
            <button onclick="switchGame('dice')" class="tab-btn">🎲 Dice</button>
            <button onclick="switchGame('wheel')" class="tab-btn">🎡 Wheel</button>
        </div>

        <div id="slot-game" class="game-box">
            <div class="reels-container">
                <span id="r1">🎰</span> <span id="r2">🎰</span> <span id="r3">🎰</span>
            </div>
            <button class="play-btn" onclick="playGame()">SPIN (100K)</button>
        </div>

        <div id="dice-game" class="game-box" style="display:none;">
            <div id="dice" class="dice-face">🎲</div>
            <button class="play-btn" onclick="playDice()">ROLL (100K)</button>
        </div>

        <div id="wheel-game" class="game-box" style="display:none;">
            <div id="wheel" class="wheel">🎡</div>
            <button class="play-btn" onclick="playWheel()">SPIN WHEEL (100K)</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
