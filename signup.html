<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Nang Nu Casino - Signup</title>
    <style>
        body { background: #0a0a0a; color: white; text-align: center; font-family: sans-serif; padding-top: 80px; }
        .login-box { background: #16162d; width: 320px; margin: auto; padding: 40px; border-radius: 20px; border: 2px solid gold; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(gold, #ccaa00); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: gold;">NANG NU CASINO</h2>
        <p>အကောင့်ဝင်ရန် အမည်ရိုက်ထည့်ပါ</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">ဂိမ်းထဲသို့ဝင်မည် (LOGIN)</button>
    </div>
    <script>
        function login() {
            const user = document.getElementById('username').value;
            if(!user) return alert("အမည်ထည့်ပါ");
            localStorage.setItem('game_user_id', 'user_' + Date.now());
            localStorage.setItem('game_username', user);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
