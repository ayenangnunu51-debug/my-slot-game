<!DOCTYPE html>
<html lang="my">
<head><meta charset="UTF-8"><title>အကောင့်သစ်ဖွင့်ရန်</title></head>
<body style="background:#0a0a0a; color:white; text-align:center; padding-top:100px;">
    <h2>Casino Signup</h2>
    <input type="text" id="name" placeholder="အမည်ရိုက်ပါ" style="padding:10px;"><br><br>
    <button onclick="register()" style="padding:10px 20px; background:gold; border:none; cursor:pointer;">START GAME</button>

    <script>
        function register() {
            const name = document.getElementById('name').value;
            if(!name) return alert("အမည်ထည့်ပါ");
            localStorage.setItem('game_user_id', 'user_' + Date.now());
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
