<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Golden Slot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h2 style="color: #ffd700; margin-top: 50px;">Register Account</h2>
        <p style="color: #8b949e;">အကောင့်အသစ်ဖွင့်ပြီး ၅၀၀၀ K ရယူပါ</p>
        
        <div class="game-box" style="margin-top: 30px;">
            <input type="text" id="reg-user" placeholder="Username ရိုက်ပါ" 
                   style="width: 90%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #30363d; background: #0a0c10; color: white;">
            
            <button class="play-btn" onclick="register()">Register & Get 5000K</button>
        </div>

        <div style="margin-top: 20px;">
            <a href="index.html" style="color: #ffd700; text-decoration: none;">🏠 ဂိမ်းဆော့ရန် ပြန်သွားမည်</a>
        </div>
        
        <p id="msg" style="margin-top: 20px; color: #ff4d4d;"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
