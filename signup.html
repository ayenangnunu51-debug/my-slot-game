<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Golden Slot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h2 style="color: #ffd700; margin-top: 50px;">Register Account</h2>
        <div class="game-box">
            <input type="text" id="username" placeholder="Username ရိုက်ပါ" style="width: 90%; padding: 15px; margin-bottom: 20px; border-radius: 10px; background: #0a0c10; color: white;">
            <button class="play-btn" onclick="handleAuth()">အကောင့်အသစ်ဖွင့်မည်</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
